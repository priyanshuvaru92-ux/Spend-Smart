packages:
  "recharts": "For rendering beautiful dashboard charts (donut and bar)"
  "date-fns": "For formatting and manipulating expense dates"
  "framer-motion": "For smooth page transitions and micro-interactions"
  "clsx": "For conditional class merging"
  "tailwind-merge": "For merging tailwind classes without conflicts"

images:
  - path: "artifacts/spendsmart/public/images/intro-bg.png"
    description: "Abstract modern 3D gradient mesh background in soft indigo, purple and teal, suitable for a clean student finance app hero screen"
    aspect_ratio: "16:9"

notes:
