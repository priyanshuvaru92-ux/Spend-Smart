kind = "web"
previewPath = "/"
title = "SpendSmart"
version = "1.0.0"
id = "artifacts/spendsmart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19534

[services.development]
run = "pnpm --filter @workspace/spendsmart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spendsmart", "run", "build" ]
publicDir = "artifacts/spendsmart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19534"
BASE_PATH = "/"
